<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Addition App</title>
  </head>
  <header>
    <h1>Simple Addition App</h1>
  </header>
  <body>
    <div id="main">
      <article class="description">
        <p>
          A simple web-based calculator built with HTML, CSS, and JavaScript.
        </p>
        <p>
          Enter a number into the first and second input field then press
          "Calculate" button
        </p>
      </article>
      <div class="container-addition">
        <label for="container-addition_firstNumber">Input first number: </label>
        <input type="number" id="container-addition_firstNumber" /><br />
        <br />
        <label for="container-addition_secondNumber"
          >Input second number:
        </label>
        <input type="number" id="container-addition_secondNumber" />
        <button class="container-addition_calculateBtn">Calculate</button>
        <div class="container-addition_showAddNums"></div>
        <div class="container-addition_showResult"></div>
      </div>
    </div>
  </body>
</html>
